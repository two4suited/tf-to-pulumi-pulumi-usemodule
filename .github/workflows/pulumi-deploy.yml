name: Pulumi Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Pulumi Up
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install Pulumi CLI
        uses: pulumi/actions@v6

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Configure Terraform credentials
        env:
          TF_TOKEN: ${{ secrets.TF_TOKEN_APP_TERRAFORM_IO }}
        run: |
          mkdir -p ~/.terraform.d
          jq -n --arg token "$TF_TOKEN" \
            '{"credentials":{"app.terraform.io":{"token":$token}}}' \
            > ~/.terraform.d/credentials.tfrc.json

      - name: Generate Terraform module SDK
        run: |
          pulumi package add terraform-module \
            app.terraform.io/BS_INC/stringformatter/bps \
            2026.512.2 \
            string-formatter

      - name: Pulumi Up
        uses: pulumi/actions@v6
        with:
          command: up
          stack-name: dev
          work-dir: .
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_TOKEN_APP_TERRAFORM_IO }}
